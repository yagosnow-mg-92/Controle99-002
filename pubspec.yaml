name: moto_gestor
description: "Painel financeiro para motociclistas de aplicativos de entrega e transporte."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Estado
  provider: ^6.1.2

  # Banco de dados local
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Gráficos
  fl_chart: ^0.68.0

  # Utilidades
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0

  # Ícones e UI moderna
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
