name: Build APK

# Roda a cada push/PR na main (para validar) e sempre que uma tag de
# versão (ex: v1.0.0) for criada, publicando o APK como Release.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  FLUTTER_VERSION: '3.24.5'

jobs:
  build:
    name: Build APK (release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Gerar plataforma Android (se ainda não existir)
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.motogestor.app --project-name moto_gestor .
          fi

      - name: Instalar dependências
        run: flutter pub get

      - name: Analisar código
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK release
        run: flutter build apk --release --split-per-abi

      - name: Build APK universal (fallback)
        run: flutter build apk --release

      - name: Upload do APK como artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: moto-gestor-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Criar Release com o APK (somente em tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
